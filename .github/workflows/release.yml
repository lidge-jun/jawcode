name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0 or 0.2.0-preview.1)"
        required: true
        type: string
      tag:
        description: "npm dist-tag"
        required: true
        type: choice
        options:
          - latest
          - preview
        default: latest
      dry-run:
        description: "Dry run (no actual publish)"
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  mac-native-probes:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: bun install --frozen-lockfile
      - run: bun run build:native
      - run: bun --cwd=packages/jwc run bundle
      - run: bun --cwd=packages/jwc run build:node
      - run: node packages/jwc/scripts/smoke-packed-sdk.mjs --native-probes

  publish:
    needs: mac-native-probes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: bun run build:native
      - run: bun run ci:check:full

      - name: Canonical JWC release validation
        run: bun run validate:jwc-release
        continue-on-error: true

      - name: Build bundles
        run: |
          bun --cwd=packages/jwc run bundle
          bun --cwd=packages/jwc run build:node

      - name: Node SDK smoke test
        run: node packages/jwc/scripts/smoke-node-sdk.mjs

      - name: Node bin syntax check
        run: node --check packages/jwc/bin/jwc.js

      - name: Pack size guard
        run: |
          cd packages/jwc
          npm pack 2>/dev/null
          SIZE=$(stat -c%s jawcode-*.tgz 2>/dev/null || stat -f%z jawcode-*.tgz)
          MAX=$((15 * 1024 * 1024))
          echo "Pack size: $SIZE bytes (max: $MAX)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Package tarball exceeds 15MB limit ($SIZE bytes)"
            exit 1
          fi
          rm -f jawcode-*.tgz

      - name: Pack file count guard
        run: |
          cd packages/jwc
          COUNT=$(npm pack --dry-run 2>&1 | grep "^npm notice total files:" | grep -o '[0-9]*')
          MAX=15
          echo "File count: $COUNT (max: $MAX)"
          if [ "$COUNT" -gt "$MAX" ]; then
            echo "::error::Package contains $COUNT files (max $MAX)"
            exit 1
          fi
      - name: Verify version matches
        run: |
          PKG_VERSION=$(node -e "console.log(require('./packages/jwc/package.json').version)")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match input (${{ inputs.version }})"
            exit 1
          fi

      - name: Publish
        run: |
          cd packages/jwc
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --dry-run --tag ${{ inputs.tag }}
          else
            npm publish --access public --provenance --tag ${{ inputs.tag }}
          fi
