name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.1 or 1.1.0-preview.1)"
        required: true
        type: string
      tag:
        description: "npm dist-tag"
        required: true
        type: choice
        options:
          - latest
          - preview
        default: latest
      dry-run:
        description: "Dry run (no actual publish)"
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  mac-native-probes:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}
          cache-on-failure: true
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run build:native
      - run: bun --cwd=packages/jwc run bundle
      - run: bun --cwd=packages/jwc run build:node
      - run: node packages/jwc/scripts/smoke-packed-sdk.mjs --native-probes

  publish:
    needs: mac-native-probes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # npm Trusted Publishing (OIDC) requires Node 22.14+ and npm 11.5.1+.
      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}
          cache-on-failure: true
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run build:native

      - name: Verify version matches
        run: |
          PKG_VERSION=$(node -e "console.log(require('./packages/jwc/package.json').version)")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match input (${{ inputs.version }})"
            exit 1
          fi

      # Publishes every public workspace package in dependency order
      # (utils → ai → natives → tui → stats → agent → coding-agent →
      # cu-mcp-server → jwc → bridge-client) in a single run. The script
      # rewrites workspace:/catalog: specs to concrete versions, runs each
      # package's preBuild (jwc bundle/build:node + full smoke matrix),
      # skips already-published name@version, and publishes with
      # --provenance via npm OIDC Trusted Publishing.
      - name: Publish all packages
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            bun scripts/ci-release-publish.ts --dry-run --tag ${{ inputs.tag }}
          else
            bun scripts/ci-release-publish.ts --tag ${{ inputs.tag }}
          fi

      - name: Post-publish registry smoke
        if: inputs.dry-run != true
        run: |
          sleep 10
          node packages/jwc/scripts/smoke-packed-sdk.mjs --registry-faithful
